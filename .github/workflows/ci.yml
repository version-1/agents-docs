name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: scripts/deploy/go.mod

      - name: Run deploy dry-run
        run: make deploy-dry-run

      - name: Test deploy scripts
        working-directory: scripts/deploy
        run: go test ./...
