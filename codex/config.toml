model = "gpt-5.5"
personality = "pragmatic"
web_search = "live"

default_permissions = "project-edit"

[permissions.project-edit]
extends = ":workspace"

[permissions.project-edit.workspace_roots]
{{codex.permissions.project_edit.workspace_roots}}

[permissions.project-edit.filesystem]
":workspace_roots" = { "." = "write" }
{{codex.permissions.project_edit.filesystem}}

[permissions.project-edit.network]
enabled = true
mode = "limited"

[permissions.project-edit.network.unix_sockets]
{{codex.permissions.project_edit.network.unix_sockets}}

[mcp_servers.notion-mcp-server]
command = "npx"
args = ["-y", "@notionhq/notion-mcp-server", "--auth-token", "${NOTION_TOKEN}"]

[tui]
status_line = ["git-branch", "session-id", "context-remaining", "used-tokens", "thread-title"]
