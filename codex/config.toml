model = "gpt-5.5"
personality = "pragmatic"
web_search = "live"

sandbox_mode = "workspace-write"
[sandbox_workspace_write]
exclude_tmpdir_env_var = true
exclude_slash_tmp = true
writable_roots = {{codex.sandbox.writable_roots}}

[mcp_servers.context7]
args = ["-y", "@upstash/context7-mcp", "--api-key", "${CONTEXT7_API_KEY}"]
command = "npx"
startup_timeout_ms = 20_000

[mcp_servers.notion-mcp-server]
command = "npx"
args = ["-y", "@notionhq/notion-mcp-server", "--auth-token", "${NOTION_TOKEN}"]

[tui]
status_line = ["git-branch", "session-id", "context-remaining", "used-tokens", "thread-title"]

